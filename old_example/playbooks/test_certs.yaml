- hosts: "{{ ansible_limit | default(omit) }}"
  become: yes
  gather_facts: no

  vars:
    system_env: BLAH
    
    ausiex_example_private_key: "{{ lookup('file', '{{ files_env_location }}/certificates/ctest.key.vaulted') }}"

 
  tasks:

    - debug:
#        msg: "{{ lookup('file', 'files/ctest.key.vaulted') | string | trim }}"
#        msg: "{{ lookup('file', '{{ files_env_location }}/certificates/ctest.key.vaulted') }}"
         msg: "{{ ausiex_example_private_key }}"

#    - name: Copy vaulted file
#      copy:
#        src: files/ctest.key.vaulted
#        dest: /tmp/ctest.key
#        decrypt: yes
#      diff: no

    - name: copy
      copy: 
        src: "tt/{{ item }}"
        dest: "/tmp/{{ item }}"
        decrypt: yes
      with_items:
        - example.pem
#        - example.key
        - ca.pem
      diff: no

    - name: Generate PKCS#12 file
#      openssl_pkcs12:
      community.crypto.openssl_pkcs12:
        action: export
        path: /tmp/example.p12
        friendly_name: exampler
        privatekey_content: "{{ lookup('file', 'tt/example.key') }}"
#        privatekey_path: /tmp/example.key
        certificate_path: /tmp/example.pem
        other_certificates_parse_all: true
        ca_certificates:
          - /tmp/ca.pem
        state: present
        passphrase: aabbcc
    

