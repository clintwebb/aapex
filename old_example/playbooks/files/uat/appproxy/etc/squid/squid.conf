#------------------------------------------
# This config is managed by Ansible.
#------------------------------------------
http_port 3128

#acl Windows_Update dstdomain windowsupdate.microsoft.com
#acl Windows_Update dstdomain .update.microsoft.com
#acl Windows_Update dstdomain download.windowsupdate.com
#acl Windows_Update dstdomain www.download.windowsupdate.com

#range_offset_limit -1 Windows_Update

#refresh_pattern -i microsoft.com/.*\.(cab|exe|ms[i|u|f]|asf|wm[v|a]|dat|zip) 4320 80% 43200 reload-into-ims
#refresh_pattern -i windowsupdate.com/.*\.(cab|exe|ms[i|u|f]|asf|wm[v|a]|dat|zip) 4320 80% 43200 reload-into-ims

acl QUERY urlpath_regex cgi-bin \?
cache deny QUERY
hosts_file /etc/hosts
refresh_pattern ^ftp:           1440    20%     10080
refresh_pattern ^gopher:        1440    0%      1440
refresh_pattern .               0       20%     4320
acl manager proto cache_object
acl SSL_ports port 443 8088 8883 6705 8010 8011  # https
acl Safe_ports port 80                           # http
acl Safe_ports port 21                           # ftp
acl Safe_ports port 443                          # https
acl Safe_ports port 8088                         # SAM Subscription manager
acl Safe_ports port 8883                         # XDM connectivity - netwealth
acl Safe_ports port 6705                         # XDM connectivity - bt
acl Safe_ports port 8010                         # XDM connectivity - cfs
acl Safe_ports port 8011                         # XDM connectivity - cfs
acl ftp proto FTP                                # FTP protocol
acl CONNECT method CONNECT
http_access allow manager localhost
http_access deny manager
http_access allow ftp
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localhost

# Logging with XFF or normal source, excluding F5 self IPs
acl f5_selfIPs_uat     src  172.26.185.2-172.26.185.5
acl has-xff req_header X-Forwarded-For ^(([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)|(\[([0-9a-f]+)?:([0-9a-f:]+)?:([0-9a-f]+|0-9\.]+)?\]))
logformat squid      %ts.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt
logformat squid-xff  %ts.%03tu %6tr %{X-Forwarded-For}>h %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt
access_log /var/log/squid/access.log squid-xff has-xff
access_log /var/log/squid/access.log squid !has-xff !f5_selfIPs_uat

# Exceptions include URLS that would normally match good_dstdom URLS
acl exceptions  dstdom_regex     ^mail\.google\.com$ ^drive\.google\.com$

# URL used for loadbalancer health checks
acl f5_monitor_url  dstdom_regex     ^www\.google\.com$

# URL Whitelist
acl good_dstdom     dstdom_regex   "/etc/squid/dstdom_regex"
acl nagios_dstdom   dstdom_regex   "/etc/squid/dstdom_nagios"
acl brokerdb_dstdom dstdom_regex   "/etc/squid/dstdom_brokerdb"
acl epelrepos urlpath_regex epel/7/x86_64

# SHY XDM DESTINATION DOMAINS
acl xdm_asgard_dstdom     dstdomain  b2bgway.acc.btfinancialgroup.com
acl xdm_bt_dstdom         dstdomain  b2bgway.acc.btfinancialgroup.com
acl xdm_btstg_dstdom      dstdomain  mlaussiexSIT.stgeorge.com.au
acl xdm_cfscs_dstdom      dstdomain  uat.cfscustomsolutions.com.au
acl xdm_ingdirect_dstdom  dstdomain  webservice10.finsyn.net.au
acl xdm_axanorth_dstdom   dstdomain  sit-bluedoor.inv-pilot.ampaws.com.au
acl xdm_netwealth_dstdom  dstdomain  jdvxdm.nwbeta.com.au


# True source IP whitelisting, derived from F5 injected XFF Header
acl coretx_web1_uat req_header X-Forwarded-For ^(172\.26\.151\.[0-9]+)
acl coretx_web2_uat req_header X-Forwarded-For ^(172\.26\.161\.[0-9]+)
acl coretx_app_uat  req_header X-Forwarded-For ^(172\.26\.166\.[0-9]+)
acl coretx_db_uat   req_header X-Forwarded-For ^(172\.26\.178\.[0-9]+)
acl shy_app_uat     req_header X-Forwarded-For ^(172\.26\.171\.[0-9]+)
acl shy_web1_uat    req_header X-Forwarded-For ^(172\.26\.153\.[0-9]+)
acl shy_web2_uat    req_header X-Forwarded-For ^(172\.26\.163\.[0-9]+)
acl shy_db_uat      req_header X-Forwarded-For ^(172\.26\.179\.[0-9]+)
acl mapper_app_uat  req_header X-Forwarded-For ^(172\.25\.110\.[0-9]+)
acl u-ctxappdc      req_header X-Forwarded-For ^(172\.26\.185\.[0-9]+)
acl u-ctxwebdc      req_header X-Forwarded-For ^(172\.26\.184\.[0-9]+)
acl devmgt1-2       req_header X-Forwarded-For ^(172\.26\.5\.203)
acl nagios          req_header X-Forwarded-For ^(172\.20\.14\.63)
acl brokerdb        req_header X-Forwarded-For ^(172\.26\.176\.[0-9]+)

# Rule enforcement
http_access deny exceptions
http_access allow coretx_web1_uat   good_dstdom
http_access allow coretx_web2_uat   good_dstdom
http_access allow coretx_app_uat    good_dstdom
http_access allow coretx_db_uat     good_dstdom
http_access allow u-ctxappdc        good_dstdom
http_access allow u-ctxwebdc        good_dstdom
http_access allow shy_app_uat       good_dstdom
http_access allow shy_app_uat       epelrepos
http_access allow shy_web1_uat      good_dstdom
http_access allow shy_web1_uat      epelrepos
http_access allow shy_web2_uat      good_dstdom
http_access allow shy_web2_uat      epelrepos
http_access allow shy_db_uat        good_dstdom
http_access allow mapper_app_uat    good_dstdom
http_access allow devmgt1-2         good_dstdom
http_access allow f5_selfIPs_uat   f5_monitor_url
http_access allow nagios      nagios_dstdom
http_access allow brokerdb    brokerdb_dstdom
http_access allow brokerdb    good_dstdom

#XDM
http_access allow shy_app_uat xdm_asgard_dstdom
http_access allow shy_app_uat xdm_bt_dstdom
http_access allow shy_app_uat xdm_btstg_dstdom
http_access allow shy_app_uat xdm_cfscs_dstdom
http_access allow shy_app_uat xdm_ingdirect_dstdom
http_access allow shy_app_uat xdm_axanorth_dstdom
http_access allow shy_app_uat xdm_netwealth_dstdom


#DENY RULES - NO ACCESS RULES BELOW THIS POINT!!
http_access deny                    good_dstdom
http_access deny all
http_reply_access allow all
icp_access allow all
coredump_dir /var/spool/squid

# Setting preference for IPv4 DNS as we dont have IPv6 networks and may cause re
dns_v4_first on

# Required to resolve issues with Labgroup SSO
forward_max_tries 25

# Use NS1-1 and NS2-1 for lookups rather than awad05
dns_nameservers 172.24.50.4 172.25.50.4
