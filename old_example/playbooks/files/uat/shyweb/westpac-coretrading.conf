<VirtualHost shy.westpac-uat.coretrading.com.au:443>
  DocumentRoot    "/opt/www/sites/docs"
  ServerName      shy.westpac-uat.coretrading.com.au
  ServerAdmin     wmaster@coreservices.com.au
  ErrorLog        /var/log/httpd/shy.westpac-uat.coretrading.com.au-error_log
  CustomLog       /var/log/httpd/shy.westpac-uat.coretrading.com.au-access_log shy-audit env=!forwarded
  CustomLog       /var/log/httpd/shy.westpac-uat.coretrading.com.au-access_log shy-audit-proxy env=forwarded
  SSLEngine on
  SSLProxyEngine on
  SSLCipherSuite ALL:!ADH:!EXPORT56:RC4+RSA:+HIGH:+MEDIUM:+LOW:+SSLv2:+EXP:+eNULL
  SSLCertificateFile     /opt/www/etc/ssl/certs/shy.westpac-uat.coretrading.com.au.crt
  SSLCertificateKeyFile  /opt/www/etc/ssl/private/shy.westpac-uat.coretrading.com.au.key
  SSLCACertificateFile   /opt/www/etc/ssl/CA/CA.crt
  SSLCADNRequestFile     /opt/www/etc/ssl/CA/CA.crt
  <Files ~ "\.(cgi|shtml|phtml|php3?)$">
    SSLOptions +StdEnvVars
  </Files>
  <Directory /opt/www/sites/>
    Require all granted
  </Directory>

  ProxyPass          "/"            "https://v.shy.onlineinvesting.westpac.com.au/"
  ProxyPassReverse   "/"            "https://v.shy.onlineinvesting.westpac.com.au/"

</VirtualHost>
