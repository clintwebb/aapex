http_port 3128
acl QUERY urlpath_regex cgi-bin \?
cache deny QUERY
refresh_pattern ^ftp:           1440    20%     10080
refresh_pattern ^gopher:        1440    0%      1440
refresh_pattern .               0       20%     4320
acl manager proto cache_object
acl SSL_ports port 443 8088 2197 5223     # https
acl Safe_ports port 80          # http
acl Safe_ports port 21          # ftp
acl Safe_ports port 443         # https
acl Safe_ports port 8088        # SAM Subscription manager
acl Safe_ports port 2197        # Apple Push Notifications
acl Safe_ports port 5223        # Apple Push Notifications
acl ftp proto FTP               # FTP protocol
acl CONNECT method CONNECT
http_access allow manager localhost
http_access deny manager
http_access allow ftp
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localhost

# Logging with XFF or normal source, excluding F5 self IPs
acl f5_selfIPs_dev     src  172.26.14.2-172.26.14.6
acl has-xff req_header X-Forwarded-For ^(([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)|(\[([0-9a-f]+)?:([0-9a-f:]+)?:([0-9a-f]+|0-9\.]+)?\]))
logformat squid      %ts.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt
logformat squid-xff  %ts.%03tu %6tr %{X-Forwarded-For}>h %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt
access_log /var/log/squid/access.log squid-xff has-xff
access_log /var/log/squid/access.log squid !has-xff !f5_selfIPs_dev
#access_log /var/log/squid/access.log squid !has-xff
#access_log /var/log/squid/access.log squid

# Exceptions include URLS that would normally match good_dstdom URLS
acl exceptions  dstdom_regex     ^mail\.google\.com$ ^drive\.google\.com$

# URL used for loadbalancer health checks
acl f5_monitor_url  dstdom_regex     ^www\.google\.com$

# URL Whitelist
acl good_dstdom      dstdom_regex     "/etc/squid/dstdom_regex"
acl devusers_dstdom  dstdom_regex     "/etc/squid/dstdom_devusers_regex"
acl brokerdb_dstdom  dstdom_regex     "/etc/squid/dstdom_brokerdb_regex"
acl msdgw_dstdom     dstdom_regex     "/etc/squid/dstdom_msdgw_regex"
acl epelrepos urlpath_regex epel/7/x86_64

# True source IP whitelisting, derived from F5 injected XFF Header
acl shyapps_dev    req_header X-Forwarded-For ^(172\.26\.14\.[0-9]+)
acl coretx_app_dev req_header X-Forwarded-For ^(172\.26\.25\.[0-9]+)
acl coretx_web_dev req_header X-Forwarded-For ^(172\.26\.26\.[0-9]+)
acl coretx_db_dev  req_header X-Forwarded-For ^(172\.26\.27\.[0-9]+)
acl soetesting     req_header X-Forwarded-For ^(172\.26\.5\.94)
acl brokerdb       req_header X-Forwarded-For ^(172\.26\.14\.71)

# DS-Microsoft Data Gateway
acl msdgw_f5       req_header X-Forwarded-For ^(172\.26\.27\.70)
acl msdgw          src 172.26.27.70/32

# Access for Nexus running on intapp
acl intapp      req_header X-Forwarded-For ^(172\.26\.5\.80)

acl sysmgt1         src 172.20.14.60/32
acl sysmgt2         src 172.26.8.1/32
acl sysmgt1_f5      req_header X-Forwarded-For ^(172\.20\.14\.60)
