#------------------------------------------
# This config is managed by Ansible.
#------------------------------------------
http_port 3128
hosts_file /etc/hosts
acl QUERY urlpath_regex cgi-bin \?
cache deny QUERY
refresh_pattern ^ftp:           1440    20%     10080
refresh_pattern ^gopher:        1440    0%      1440
refresh_pattern .               0       20%     4320
acl manager proto cache_object
acl SSL_ports port 443 8088 8883 6705 8010 8011 # https
acl Safe_ports port 80                          # http
acl Safe_ports port 21                          # ftp
acl Safe_ports port 443                         # https
acl Safe_ports port 8883                        # XDM connectivity - netwealth
acl Safe_ports port 6705                        # XDM connectivity - bt
acl Safe_ports port 8010                        # XDM connectivity - cfs
acl Safe_ports port 8011                        # XDM connectivity - cfs
acl ftp proto FTP                               # FTP protocol
acl CONNECT method CONNECT
http_access allow manager localhost
http_access deny manager
http_access allow ftp
http_access deny !Safe_ports
http_access allow localhost

# Logging with XFF or normal source, excluding F5 self IPs
acl f5_selfIPs_prod     src  172.26.81.2-172.26.81.5
acl has-xff req_header X-Forwarded-For ^(([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)|(\[([0-9a-f]+)?:([0-9a-f:]+)?:([0-9a-f]+|0-9\.]+)?\]))
logformat squid      %ts.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt
logformat squid-xff  %ts.%03tu %6tr %{X-Forwarded-For}>h %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt
access_log /var/log/squid/access.log squid-xff has-xff
access_log /var/log/squid/access.log squid !has-xff !f5_selfIPs_prod

# Exceptions include URLS that would normally match good_dstdom URLS
acl exceptions  dstdom_regex     ^mail\.google\.com$ ^drive\.google\.com$

# URL used for loadbalancer health checks
acl f5_monitor_url  dstdom_regex     ^www\.google\.com$

# URL Whitelist
acl good_dstdom     dstdom_regex     "/etc/squid/dstdom_regex"
acl brokerdb_dstdom dstdom_regex     "/etc/squid/dstdom_brokerdb_regex"

acl xdm_asgard_dstdom     dstdomain  b2bgway.btfinancialgroup.com
acl xdm_bt_dstdom         dstdomain  b2bgway.btfinancialgroup.com
acl xdm_btstg_dstdom      dstdomain  mlausiex.stgeorge.com.au
acl xdm_cfscs_dstdom      dstdomain  www.commsecadviserservicesps.com.au
acl xdm_ingdirect_dstdom  dstdomain  ingwebservices.finsyn.net.au
#acl xdm_axanorth_dstdom   dstdomain  portal.northonline.com.au
acl xdm_axanorth_dstdom   dstdomain  equity.northonline.amp.com.au
acl xdm_netwealth_dstdom  dstdomain  jdvxdm.netwealth.com.au


# True source IP whitelisting, derived from F5 injected XFF Header
acl coretx_web1_prod   req_header X-Forwarded-For ^(172\.26\.33\.[0-9]+)
acl coretx_web2_prod   req_header X-Forwarded-For ^(172\.26\.36\.[0-9]+)
acl coretx_webfs1_prod req_header X-Forwarded-For ^(172\.26\.34\.[0-9]+)
acl coretx_webfs2_prod req_header X-Forwarded-For ^(172\.26\.37\.[0-9]+)
acl coretx_dc1_prod    req_header X-Forwarded-For ^(172\.26\.80\.[0-9]+)
acl coretx_dc2_prod    req_header X-Forwarded-For ^(172\.26\.81\.[0-9]+)
acl coretx_app_prod    req_header X-Forwarded-For ^(172\.26\.49\.[0-9]+)
acl coretx_db_prod     req_header X-Forwarded-For ^(172\.26\.66\.[0-9]+)
acl p-ctxappdc         req_header X-Forwarded-For ^(172\.26\.81\.[0-9]+)
acl p-ctxwebdc         req_header X-Forwarded-For ^(172\.26\.80\.[0-9]+)
acl shy_app_prod       req_header X-Forwarded-For ^(172\.26\.51\.[0-9]+)
acl shy_web1_prod      req_header X-Forwarded-For ^(172\.26\.39\.[0-9]+)
acl shy_web2_prod      req_header X-Forwarded-For ^(172\.26\.41\.[0-9]+)
acl shy_db1_prod       req_header X-Forwarded-For ^(172\.26\.68\.[0-9]+)
acl shy_db2_prod       req_header X-Forwarded-For ^(172\.26\.71\.[0-9]+)
acl shyforms_prod      req_header X-Forwarded-For ^(172\.26\.52\.[0-9]+)
acl broker_prod        req_header X-Forwarded-For ^(172\.26\.64\.[0-9]+)
acl mapper_app_prod    req_header X-Forwarded-For ^(172\.24\.31\.[0-9]+)
acl ausfmc             req_header X-Forwarded-For ^(172\.25\.71\.1[0-2])

# Rule enforcement
http_access deny exceptions
http_access allow coretx_web1_prod   good_dstdom
http_access allow coretx_web2_prod   good_dstdom
http_access allow coretx_webfs1_prod good_dstdom
http_access allow coretx_webfs2_prod good_dstdom
http_access allow coretx_dc1_prod    good_dstdom
http_access allow coretx_dc2_prod    good_dstdom
http_access allow coretx_app_prod    good_dstdom
http_access allow coretx_db_prod     good_dstdom
http_access allow p-ctxappdc         good_dstdom
http_access allow p-ctxwebdc         good_dstdom
http_access allow shy_app_prod       good_dstdom
http_access allow shy_web1_prod      good_dstdom
http_access allow shy_web2_prod      good_dstdom
http_access allow shy_db1_prod       good_dstdom
http_access allow shy_db2_prod       good_dstdom
http_access allow shyforms_prod      good_dstdom
http_access allow broker_prod        good_dstdom
http_access allow mapper_app_prod    good_dstdom
http_access allow ausfmc             good_dstdom
http_access allow f5_selfIPs_prod   f5_monitor_url
http_access allow broker_prod        brokerdb_dstdom

#XDM
http_access allow shy_app_prod xdm_asgard_dstdom
http_access allow shy_app_prod xdm_bt_dstdom
http_access allow shy_app_prod xdm_btstg_dstdom
http_access allow shy_app_prod xdm_cfscs_dstdom
http_access allow shy_app_prod xdm_ingdirect_dstdom
http_access allow shy_app_prod xdm_axanorth_dstdom
http_access allow shy_app_prod xdm_netwealth_dstdom

http_access deny                    good_dstdom
http_access deny all
http_reply_access allow all
icp_access allow all
coredump_dir /var/spool/squid

# Setting preference for IPv4 DNS as we dont have IPv6 networks and may cause re
dns_v4_first on

# Required to resolve issues with Labgroup SSO
forward_max_tries 25

# Use NS1-1 and NS2-1 for lookups rather than awad05
dns_nameservers 172.24.50.4 172.25.50.4
