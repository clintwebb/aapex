# This is for general cleanup of Legacy stuff (that can be done at the end of the play)
# In other words, anything that needs to be removed before something else is done, should be in its own playbook and placed in the correct order.


- name: General Cleanup
  hosts: all
  gather_facts: no
  become: yes

  tasks:
    - name: "Remove cockpit banners"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      with_items:
        - /etc/issue.d/cockpit.issue 
        - /etc/motd.d/cockpit

    # Invalid users generally describes accounts that are for previous employees... this is just general cleanup.. access was removed.
    - name: Cleanup /home folders of invalid users
      file:
        path: "/home/{{ item }}"
        state: absent
      with_items:
        - dasarima
        - eatonki_adm
        - hazrakau
        - staffoj
        - wilkinal


    # Removed packages should already have been removed in the base_packages.yaml playbook.

    # Be very careful and aware of the impact of removing the folder/file.
    - name: General cleanup of folders from applications that no longer in-place.
      file:
        path: "{{ item }}"
        state: absent
      with_items:
        - /var/cache/download_and_do
        - /var/McAfee
        - /opt/McAfee
        - /opt/splunkforwarder
        - /etc/init.d/splunk
        - /etc/rc.d/rc0.d/K60splunk
        - /etc/rc.d/rc1.d/K60splunk
        - /etc/rc.d/rc2.d/S90splunk
        - /etc/rc.d/rc3.d/S90splunk
        - /etc/rc.d/rc4.d/S90splunk
        - /etc/rc.d/rc5.d/S90splunk
        - /etc/rc.d/rc6.d/K60splunk
        - /var/spool/mail/splunk
        - /opt/NAI
        - /post
        - /1
      diff: no

    - name: rename 'clear_sssd_cache.sh
      replace:
        path: /etc/rc.d/rc.local
        regexp: "'/post/clear_sssd_cache.sh'"
        replace: "/post/clear_sssd_cache.sh"
    
    - name: Remove 'post' scripting in /etc/rc.d/rc.local
      replace:
        path: /etc/rc.d/rc.local
        regexp: "(^if \\[\\[ -f /post[\\s\\S]*)^fi"
        backup: yes


