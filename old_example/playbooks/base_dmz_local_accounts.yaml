# Servers in DMZ zones do not connect to the ActiveDirectories, so require local accounts for system maintenance.
#
# Note that dmz_local_sysadmin is included in this playbook and cannot be over-written in group_vars.
# However, if there are other dmz server groups that require additional access, then they can set 'dmz_local_extra' list
# and it will get combined.  This is currently not used anywhere except our management boxes.
