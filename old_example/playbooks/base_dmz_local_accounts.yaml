  tasks:

    - name: Local Group (sysadmin)
      group:
        name: sysadmin
        gid: 1001
        state: present

    - name: Get Local Account Details
      getent:
        database: passwd

    - name: Rename existing accounts
      shell:
        cmd: "usermod --login {{ item.user }} {{ item.rename }}"
        creates: "/home/{{ item.user }}"
      with_items: "{{ dmz_local_sysadmin + dmz_local_extra|default([]) }}"
      when: item.rename is defined and item.rename in ansible_facts.getent_passwd
      loop_control:
        label: "{{ item.user }}"

    - name: Local Accounts
      user:
        name: "{{ item.user }}"
        comment: "{{ item.comment }}"
        uid: "{{ item.uid }}"
        group: "{{ item.group | default('sysadmin') }}"
        home: "/home/{{ item.user }}"
        move_home: yes
        expires: -1
      with_items: "{{ dmz_local_sysadmin + dmz_local_extra|default([]) }}"
      loop_control:
        label: "{{ item.user }}"

    - name: Local Accounts - Set Expire
      shell:
        cmd: "passwd -x {{ item.expire | default('99999') }} {{ item.user }}"
        warn: false
      changed_when: false
      ignore_errors: true
      with_items: "{{ dmz_local_sysadmin + dmz_local_extra|default([]) }}"
      loop_control:
        label: "{{ item.user }}"

    - name: Apply SSH Public Keys
      authorized_key:
        user: "{{ item.user }}"
        key: "{{ item.key }}"
      with_items: "{{ dmz_local_sysadmin + dmz_local_extra|default([]) }}"
      when: item.key is defined
      loop_control:
        label: "{{ item.user }}"

    - name: Remove any users removed
      user:
        name: "{{ item }}"
        remove: true
        state: absent
      with_items: "{{ dmz_removed_users | default([]) }}"
