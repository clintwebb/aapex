#        job: "find ~/logs/  -type f -mtime +30 -exec rm -f {} \; >> ~/logs/cron.`date +\%Y\%m\%d`.log 2>&1"
#      with_items: "{{ sftp_accounts }}"
#      loop_control:
#        label: "{{ item.name }}"
#      when: >
#        (item.absent is not defined or not item.absent) and
#        (item.auto_cleanup is not defined or not item.auto_cleanup

    - name: Crons
      cron:
        name: "{{ item.name }}"
        user: "{{ item.user }}"
        minute: "{{ item.minute | default(omit) }}"
        hour: "{{ item.hour | default(omit) }}"
        job: "{{ item.job | default(omit) }}"
        state: "{{ item.state | default(omit) }}"
      with_items: "{{ ausftp_crons_all | default([]) + ausftp_crons_test | default([]) + ausftp_crons_uat | default([]) + ausftp_crons_prod | default([]) }}"
      loop_control:
        label: "{{ item.user }}_{{ item.name }}"
#      diff: no

    # Crons will only run for accounts that exists, but good to cleanup.
    - name: Delete crons for deleted accounts
      file:
        path: "/var/spool/cron/{{ item.name }}"
        state: absent 
      with_items: "{{ sftp_accounts }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.absent is defined and item.absent
