# The purpose of this is to call all the related playbooks to deploy security/compliance standards accross all our environments.
# the playbooks will be seperated based on functionality, just to keep things simpler to maintain.
# 
# It is also very likely that automated processes will be installed which will run this playbook regularly to ensure the servers maintain 
# stability and consitency across our entire infrastructure (similar to what puppet did previously).
#
# NOTE that the playbooks will be executed in the order they are listed.
---

# Verify connectivity/login before running the entire list of playbooks on multiple hosts.
# The primary reason for this, is that if the hosts are on LDAP authentication and the user accidentally types 
# their password incorrectly, it can end up locking their account because the login attempts are on 
# multiple servers at the same time.
# To avoid this, we first attempt a login on one server from the list, and only continue when it succeeds.
- name: Verify connection
  gather_facts: false
  hosts: all,!dmz
  become: false
  tasks:
    - name: Check if Password is Correct
      command: echo "Password is Correct"
      run_once: true
      check_mode: false
      changed_when: false
      tags: always

    - name: Check if Sudo Password is Correct
      command: echo "Sudo Password is Correct"
      become: true
      run_once: true
      check_mode: false
      changed_when: false
      tags: always

