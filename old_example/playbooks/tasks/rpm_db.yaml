# Check the integrity of the RPM DB (as it can rarely be broken)

- name: Check if RPM DB is OK
  shell:
    cmd: "rpm --quiet -qa"
    warn: false
  check_mode: false
  changed_when: false
  ignore_errors: true
  register: result_rpm_db_check

- name: Fix RPM DB
  when: result_rpm_db_check.rc != 0
  block:
    - name: Ensure RPM DB backup directory exists (for safe review)
      file:
        path: /var/lib/rpm/backup
        state: directory 

    - name: Copy Existing files to the backup directory
      shell:
        cmd: "cp -a /var/lib/rpm/__db* /var/lib/rpm/backup/"
      ignore_errors: true
      
    - name: Remove existing rpm db files
      shell:
        cmd: "rm -f /var/lib/rpm/__db.[0-9][0-9]*"
        warn: false
      ignore_errors: true
    
    - name: Rebuild RPM db
      shell:
        cmd: "rpm --quiet -qa; rpm --rebuilddb; yum clean all"
        warn: false
        
