# This contains variables that will be used across all servers/groups/environments.
# Content here can also be over-written by config allocated to other groups, but this is the fall-back general config.

# It is yet to be determined if we want the default to be 'dev' side, and over-written at the production (and other levels)... or if it 
# should be the final result (production), and over-written at the lower levels.

---
# Used for Local Account on shyapps servers.   Some will allow login, others not.  By default, not.
shyapps_shell: /sbin/nologin

kickstart_prod: kickstart.prod.mgt.internal.ausiex.com
kickstart_nonprod: kickstart.nonprod.mgt.internal.ausiex.com

# Basic vanilla storage settings.
# Note that for additional storage, a 'local_storage_extra' list can be defined.  
# Also recommended that variables can be defined in groups to over-ride the defaults rather than duplicating the default list.
local_storage:
  - lv: "{{ lv_name_root | default('lv_root') }}"
    size: "{{ storage_size_root | default('8g') }}"
    mnt: /
    mnt_mode: '0555'
  - lv: "{{ lv_name_opt | default('lv_opt') }}"
    size: "{{ storage_size_opt | default('6g') }}"
    mnt: /opt
  - lv: "{{ lv_name_var | default('lv_var') }}"
    size: "{{ storage_size_var | default('8g') }}"
    mnt: /var
  - lv: "{{ lv_name_tmp | default('lv_tmp') }}"
    size: "{{ storage_size_tmp | default('2g') }}"
    mnt: /tmp
    mnt_mode: '01777'
    mnt_opts: 'nodev,nosuid,noexec'
  - lv: "{{ lv_name_home | default('lv_home') }}"
    size: "{{ storage_size_home | default('2g') }}"
    mnt: /home

