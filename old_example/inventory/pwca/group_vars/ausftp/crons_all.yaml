ausftp_crons_all:
  - name: transfer_out
    user: complyadvantage
    minute: "5,15,25,35,45,55"
    job: >
      /scripts/b2bproxy/transfer_out_with_password.sh sftp.ap.complyadvantage.com {{ complyadvantage_login }} '{{ complyadvantage_pass }}' . outgoing >> ~/logs/cron.`date +\%Y\%m\%d`.log 2>&1
  - name: transfer_in
    user: complyadvantage
    minute: "7,17,27,37,47,57"
    job: >
      /scripts/b2bproxy/transfer_in_with_password.sh sftp.ap.complyadvantage.com {{ complyadvantage_login }} {{ complyadvantage_pass | quote }} sftp_uploader_errors incoming >> ~/logs/cron.`date +\%Y\%m\%d`.log 2>&1

