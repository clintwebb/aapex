# This list of crons get applied to all AUSFTP hosts.  A seperate list will exist for different environments for crons that are unique.
#
# 
# NOTE: Most crons run at periodic timeframe (ie, every 10 minutes).  
#       It highly recommended to spread it over the 10 minute time.  
#       Randomly choose a number between 0 and 9, and then use that.  
#         ie, choose one of the following
#             minute: "0,10,20,30,40,50"
#             minute: "1,11,21,31,41,51"
#             minute: "2,12,22,32,42,52"
#             minute: "3,13,23,33,43,53"
#             minute: "4,14,24,34,44,54"
#             minute: "5,15,25,35,45,55"
#             minute: "6,16,26,36,46,56"
#             minute: "7,17,27,37,47,57"
#             minute: "8,18,28,38,48,58"
#             minute: "9,19,29,39,49,59"


#ausftp_crons_all: 
